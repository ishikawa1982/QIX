name: Deploy client to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/mobile-qix-territory-game-anqbxv
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build client for Pages
        env:
          # Serve under https://<user>.github.io/<repo>/
          PAGES_BASE: /${{ github.event.repository.name }}/
          # Multiplayer server (set repo variable VITE_WS_URL to wss://<app>.onrender.com/ws).
          # Solo works even when this is empty; online just can't connect.
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
        run: npm run --workspace client build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
